<!DOCTYPE html>
<html lang="de">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    img {
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>

<body>
  <img id="displayImage" src="index.png" alt="Display">

  <script>
    // Bild alle 20 Sekunden neu laden (Cache umgehen)
    function updateImage() {
      const img = document.getElementById("displayImage");
      img.src = "index.png?t=" + Date.now();
    }

    setInterval(updateImage, 20000);
  </script>
</body>
</html>
